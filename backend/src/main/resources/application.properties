spring.application.name=markdown-maps-backend
server.port=${PORT:8080}

markdown-maps.storage-path=./data/mind-map.json
markdown-maps.storage-backend=${STORAGE_BACKEND:json}
markdown-maps.default-snapshot-id=${DEFAULT_SNAPSHOT_ID:${SUPABASE_SNAPSHOT_ID:default}}
markdown-maps.supabase-url=${SUPABASE_URL:}
markdown-maps.supabase-service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
markdown-maps.supabase-snapshot-id=${SUPABASE_SNAPSHOT_ID:default}
markdown-maps.cors-allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
markdown-maps.google-client-id=${GOOGLE_CLIENT_ID:}
